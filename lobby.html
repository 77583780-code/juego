<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOOT SCHOOL - LOBBY OFICIAL</title>
    <style>
        /* =========================================
           CSS: ESTILO FRUTIGER AERO (COMO TU IMAGEN)
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #000; }

        /* Fondo de Video (El de YouTube de tu imagen) */
        .video-bg { position: absolute; inset: 0; z-index: 1; pointer-events: none; transition: opacity 1s; }
        .video-bg iframe {
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0.7; /* Brillo ajustado */
        }

        /* Contenedor para el motor 3D (Donde saldrá tu skin) */
        #canvas-3d { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        /* INTERFAZ DE USUARIO (UI) */
        .ui-overlay {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 20, 40, 0.3); backdrop-filter: blur(10px); /* Efecto cristal */
        }

        /* La Tarjeta Azul Brillante de tu imagen */
        .frutiger-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(0,200,255,0.4));
            border: 3px solid white; border-radius: 40px;
            padding: 40px; width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,100,255,0.4), inset 0 0 20px rgba(255,255,255,0.8);
            color: #005588;
        }

        h1 { margin: 0 0 20px; font-size: 2.5rem; font-weight: 700; background: linear-gradient(to bottom, #00bbff, #0055ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; font-weight: 700; }

        /* Inputs y Selects Estilo Burbuja */
        .input-frutiger {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 15px;
            border: 2px solid #00bbff; background: rgba(255,255,255,0.9);
            font-size: 1rem; color: #005588; font-family: 'Quicksand', sans-serif;
            text-align: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        select.input-frutiger { width: 100%; cursor: pointer; }

        /* Botón "Go" Azul Brillante de tu imagen */
        .btn-go {
            background: linear-gradient(to bottom, #77eeff 0%, #00aaff 25%, #0088ff 70%, #0066ee 100%);
            color: white; border: none; width: 100%; border-radius: 20px;
            padding: 15px; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,119,255,0.5), inset 0 4px 10px rgba(255,255,255,0.6);
            transition: 0.3s; margin-top: 15px;
        }
        .btn-go:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* HUD DEL LOBBY (Se activa después del login) */
        #hud-lobby { display: none; position: absolute; inset: 0; z-index: 15; pointer-events: none; }
        
        /* Tarjeta de Información arriba a la izquierda */
        .info-player {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.8); border: 2px solid #00bbff;
            padding: 15px 30px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .info-player h2 { margin: 0; color: #0077cc; font-size: 1.5rem; }
        .info-player p { margin: 5px 0 0; color: #0099ee; font-weight: bold; }

        /* Tienda de Skins abajo */
        #shop-pills {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 10px; pointer-events: auto;
        }
        .pill {
            background: rgba(255,255,255,0.9); border: 2px solid #00bbff;
            border-radius: 30px; padding: 10px 20px; cursor: pointer;
            font-weight: bold; color: #0077cc; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s; text-transform: uppercase;
        }
        .pill:hover { background: #00bbff; color: white; transform: translateY(-3px); }

        /* Botón LISTO Amarillo/Naranja (Estilo Fortnite) */
        .btn-ready {
            position: absolute; bottom: 30px; right: 30px; pointer-events: auto;
            background: linear-gradient(to bottom, #ffea00, #ffbb00 50%, #cc8800 100%);
            color: white; border: none; padding: 15px 40px;
            font-size: 1.5rem; font-weight: 700; border-radius: 10px; cursor: pointer;
            box-shadow: 0 8px 0 #aa6600, 0 10px 20px rgba(0,0,0,0.4);
            text-transform: uppercase; transition: 0.1s;
        }
        .btn-ready:active { transform: translateY(5px); box-shadow: 0 3px 0 #aa6600, 0 5px 10px rgba(0,0,0,0.4); }

        /* Pantalla de Carga Frutiger */
        #glb-loading {
            position: absolute; top: 20px; right: 20px; display: none;
            color: #00ffff; font-weight: bold; text-shadow: 0 0 10px #00ffff;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="video-bg" id="bg-video">
        <iframe src="https://www.youtube.com/embed/I5NTleOZVg8?autoplay=1&mute=1&loop=1&playlist=I5NTleOZVg8&controls=0&modestbranding=1" frameborder="0"></iframe>
    </div>

    <div id="canvas-3d"></div>

    <div class="ui-overlay" id="reg-screen">
        <div class="frutiger-card">
            <h1>SHOOT SCHOOL</h1>
            <p>CREA TU CUENTA TÁCTICA</p>
            <input type="text" id="in-nick" class="input-frutiger" placeholder="Nickname..." required>
            <input type="date" id="in-dob" class="input-frutiger" title="Fecha de Nacimiento" required>
            <input type="number" id="in-age" class="input-frutiger" placeholder="Edad..." min="10" required>
            <select id="in-gender" class="input-frutiger">
                <option value="H">Género: HOMBRE</option>
                <option value="M">Género: MUJER</option>
            </select>
            <button class="btn-go" onclick="crearCuenta()">CREAR CUENTA</button>
        </div>
    </div>

    <div id="glb-loading">CARGANDO SKIN...</div>
    <div id="hud-lobby">
        <div class="info-player">
            <h2 id="hud-nick">SOLDIER</h2>
            <p id="hud-age">NIVEL: 0</p>
        </div>
        
        <div id="shop-pills">
            <button class="pill" onclick="cargarModelo('CT.glb')">CT URBAN</button>
            <button class="pill" onclick="cargarModelo('Lara.glb')">LARA SWIM</button>
            <button class="pill" onclick="cargarModelo('Renegade.glb')">RENEGADE RAIDER</button>
            <button class="pill" onclick="cargarModelo('Phoenix.glb')">TR PHOENIX</button>
        </div>

        <button class="btn-ready" onclick="alert('¡Buscando partida...')">¡LISTO!</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // ================= JAVASCRIPT Y MOTOR 3D =================
        const loader = new THREE.GLTFLoader();
        let scene, camera, renderer, skinActual;

        function crearCuenta() {
            // Recoger datos
            const nick = document.getElementById('in-nick').value;
            const edad = document.getElementById('in-edad').value;
            const genero = document.getElementById('in-gender').value;

            if(!nick || !edad) {
                alert("⚠️ Ingresa nombre y edad soldado.");
                return;
            }

            // Cambiar Pantallas
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('hud-lobby').style.display = 'block';
            document.getElementById('hud-nick').innerText = nick;
            document.getElementById('hud-age').innerText = `NIVEL: ${edad}`;

            // Iniciar Motor 3D y cargar skin inicial
            initMotor3D();
            
            // Cargar skin inicial basada en género usando nombres exactos
            if(genero === "H") {
                cargarModelo('CT.glb');
            } else {
                cargarModelo('Lara.glb');
            }
        }

        function initMotor3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Mejoras de color Frutiger
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            
            // ILUMINACIÓN BRILLANTE (Puro Frutiger Aero)
            scene.add(new THREE.AmbientLight(0xffffff, 1.8)); // Luz base brillante
            
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 10, 7);
            scene.add(sun);
            
            const backlight = new THREE.DirectionalLight(0x00ffff, 0.5);
            backlight.position.set(-5, 5, -5);
            scene.add(backlight);
            
            camera.position.set(0, 1.3, 4.5); // Posición estilo Fortnite
            animate();
        }

        function cargarModelo(archivo) {
            document.getElementById('glb-loading').style.display = 'block';
            
            // Quitar skin anterior
            if (skinActual) scene.remove(skinActual);
            
            // Cargar el archivo .glb relativo (funciona en GitHub Pages)
            loader.load(archivo, (gltf) => {
                skinActual = gltf.scene;
                
                // --- AUTO-ESCALADO INTELIGENTE (LA MAGIA) ---
                const box = new THREE.Box3().setFromObject(skinActual);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const scale = 2.4 / size.y; // Fuerza a todos a medir 2.4 de alto
                skinActual.scale.set(scale, scale, scale);
                
                // Centrarlo perfectamente frente a la cámara
                skinActual.position.x = -(center.x * scale);
                skinActual.position.y = -(center.y * scale) + 0.1; // Un poco arriba
                skinActual.position.z = 0; 

                scene.add(skinActual);
                document.getElementById('glb-loading').style.display = 'none';
            }, undefined, (e) => {
                alert("❌ No se encuentra: " + archivo + ". Revisa GitHub.");
                document.getElementById('glb-loading').style.display = 'none';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            // Tu skin gira lentamente como en Fortnite
            if (skinActual) {
                skinActual.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }

        window.onresize = () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };
    </script>
</body>
</html>

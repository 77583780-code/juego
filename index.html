<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoot School - CS2 Lobby</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d1117; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        
        /* Fondo táctico */
        #fondo-tactico {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./image_670a80.jpg'); /* Tu fondo de imagen */
            background-size: cover; background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        /* --- BARRA SUPERIOR --- */
        #navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background-color: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(5px); border-bottom: 1px solid #30363d; z-index: 10; position: relative;
        }
        #pestañas { display: flex; gap: 30px; }
        .pestaña { font-size: 1.1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; opacity: 0.7; transition: opacity 0.3s; }
        .pestaña:hover, .pestaña.activa { opacity: 1; border-bottom: 2px solid #fff; }
        #logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; color: #fdfdfd; }

        /* --- CONTENEDOR CENTRAL DEL LOBBY --- */
        #lobby-container {
            display: flex; justify-content: space-between; align-items: stretch;
            height: calc(100vh - 75px); padding: 40px; box-sizing: border-box; position: relative;
        }

        /* Paneles laterales */
        .panel {
            width: 250px; background-color: rgba(22, 27, 34, 0.8);
            border-radius: 12px; border: 1px solid #30363d; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 5;
        }
        .panel h3 { margin-top: 0; border-bottom: 2px solid #30363d; padding-bottom: 10px; }

        /* Lienzo para el personaje 3D central */
        #canvas-personaje {
            flex-grow: 1; display: flex; justify-content: center; align-items: end; position: relative;
        }

        /* --- BOTÓN JUGAR --- */
        #btn-play {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 280px; height: 70px;
            background: linear-gradient(135deg, #189c44, #00C853);
            border: none; border-radius: 50px; color: #fff;
            font-size: 2rem; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.6); cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; z-index: 15;
        }
        #btn-play:hover { transform: translateX(-50%) translateY(-3px); box-shadow: 0 15px 40px rgba(0, 200, 83, 0.8); }
        #btn-play:active { transform: translateX(-50%) translateY(1px); box-shadow: 0 5px 20px rgba(0, 200, 83, 0.5); }
    </style>
</head>
<body>
    <div id="fondo-tactico"></div>

    <div id="navbar">
        <div id="logo">SHOOT SCHOOL</div>
        <div id="pestañas">
            <div class="pestaña activa">Jugar (Play)</div>
            <div class="pestaña">Inventario</div>
            <div class="pestaña">Ajustes</div>
            <div class="pestaña">Social</div>
        </div>
        <div id="nombre-jugador">Jugador Invitado</div>
    </div>

    <div id="lobby-container">
        <div class="panel">
            <h3>Online (1)</h3>
            <p id="lista-jugadores">1. Cargando...</p>
        </div>

        <div id="canvas-personaje">
            <button id="btn-play">Jugar</button>
        </div>

        <div class="panel">
            <h3>Estadísticas</h3>
            <p>Nivel: 1</p>
            <p>Kills: 0</p>
            <p>Monedas: 0</p>
            <p id="info-skin">Skin: Cargando...</p>
        </div>
    </div>

    <script>
        // 1. Leer los datos del jugador desde la pantalla de inicio
        let usuario = JSON.parse(localStorage.getItem('shootSchoolUser'));
        
        if(usuario && usuario.nombre) {
            document.getElementById('nombre-jugador').innerText = usuario.nombre;
            document.getElementById('lista-jugadores').innerText = "1. " + usuario.nombre;
            document.getElementById('info-skin').innerText = "Skin: " + usuario.skin;
        }

        // 2. Configurar Three.js en el centro del lobby
        const contenedor = document.getElementById('canvas-personaje');
        const escena = new THREE.Scene();
        // La cámara apunta al centro
        const camara = new THREE.PerspectiveCamera(45, contenedor.clientWidth / contenedor.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); // Fondo transparente
        
        renderer.setSize(contenedor.clientWidth, contenedor.clientHeight);
        contenedor.appendChild(renderer.domElement);

        // 3. Luces para que los modelos de Lara o Renegade no se vean oscuros
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 1);
        escena.add(luzAmbiente);
        const luzDireccional = new THREE.DirectionalLight(0xffffff, 1);
        luzDireccional.position.set(5, 10, 7);
        escena.add(luzDireccional);

        // 4. Elegir el archivo .glb correcto según lo que eligió en la pantalla 1
        let archivoModelo = '';
        let skinElegida = usuario ? usuario.skin : 'Renegade Raider'; // Por defecto

        // IMPORTANTE ALONSO: Cambia estos nombres ('lara.glb', etc.) por los nombres EXACTOS de tus archivos en GitHub
        if (skinElegida === 'Lara Croft') archivoModelo = 'lara.glb'; 
        else if (skinElegida === 'Renegade Raider') archivoModelo = 'renegade.glb'; 
        else if (skinElegida === 'Phoenix (Terrorista)') archivoModelo = 'phoenix.glb'; 
        else if (skinElegida === 'Urban (CT)') archivoModelo = 'urban.glb'; 
        else archivoModelo = 'renegade.glb'; // Si hay error, carga este

        // 5. Cargar el modelo 3D
        let personaje3D;
        const loader = new THREE.GLTFLoader();

        loader.load(
            archivoModelo, 
            function (gltf) {
                personaje3D = gltf.scene;
                
                // Centrar y escalar el personaje (Puedes cambiar estos números si se ve muy grande o chico)
                personaje3D.scale.set(1.5, 1.5, 1.5); 
                personaje3D.position.set(0, -2.5, 0); 
                
                escena.add(personaje3D);
            },
            undefined,
            function (error) {
                console.error('Error al cargar la skin:', error);
            }
        );

        camara.position.set(0, 0, 6);

        // 6. Animación de rotación automática
        function animar() {
            requestAnimationFrame(animar);
            if (personaje3D) {
                personaje3D.rotation.y += 0.005; // Velocidad de giro
            }
            renderer.render(escena, camara);
        }

        window.addEventListener('resize', () => {
            camara.aspect = contenedor.clientWidth / contenedor.clientHeight;
            camara.updateProjectionMatrix();
            renderer.setSize(contenedor.clientWidth, contenedor.clientHeight);
        });

        animar();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoot School - Crear Usuario</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Fondo táctico */
        #fondo-tactico {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./image_670a80.jpg'); background-size: cover; background-position: center; opacity: 0.3; filter: grayscale(80%); z-index: -1;
        }

        .registro-box {
            background: rgba(22, 27, 34, 0.9); padding: 40px; border-radius: 15px; border: 1px solid #30363d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); width: 400px; text-align: center; z-index: 10;
        }

        h1 { margin-top: 0; color: #00C853; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; text-align: left; margin: 15px 0 5px 0; font-weight: bold; color: #aaa; }
        input[type="text"], input[type="date"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d;
            background: #0d1117; color: #fff; font-size: 1rem; box-sizing: border-box;
        }

        /* Botones de Selección */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-select {
            flex: 1; padding: 10px; background: #0d1117; border: 1px solid #30363d;
            color: #fff; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-select.active { background: #00C853; color: #000; border-color: #00C853; font-weight: bold; }

        /* Contenedores de Skins (Ocultos por defecto) */
        #skins-mujer, #skins-hombre { display: none; }

        .btn-entrar {
            width: 100%; padding: 15px; margin-top: 30px; background: linear-gradient(135deg, #189c44, #00C853);
            border: none; border-radius: 8px; color: #fff; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: transform 0.2s;
        }
        .btn-entrar:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 200, 83, 0.5); }
    </style>
</head>
<body>
    <div id="fondo-tactico"></div>

    <div class="registro-box">
        <h1>Crear Agente</h1>
        
        <label for="nombre">Nombre de Usuario</label>
        <input type="text" id="nombre" placeholder="Ej: AlonsoXD" required>

        <label for="fecha">Fecha de Nacimiento</label>
        <input type="date" id="fecha" required>

        <label>Género</label>
        <div class="btn-group">
            <button class="btn-select" id="btn-hombre" onclick="seleccionarGenero('hombre')">Hombre</button>
            <button class="btn-select" id="btn-mujer" onclick="seleccionarGenero('mujer')">Mujer</button>
        </div>

        <div id="skins-hombre">
            <label>Selecciona tu Skin</label>
            <div class="btn-group">
                <button class="btn-select skin-btn" onclick="seleccionarSkin(this, 'Phoenix (Terrorista)')">Agente Phoenix</button>
                <button class="btn-select skin-btn" onclick="seleccionarSkin(this, 'Urban (CT)')">Agente Urban</button>
            </div>
        </div>

        <div id="skins-mujer">
            <label>Selecciona tu Skin</label>
            <div class="btn-group">
                <button class="btn-select skin-btn" onclick="seleccionarSkin(this, 'Lara Croft')">Lara Croft</button>
                <button class="btn-select skin-btn" onclick="seleccionarSkin(this, 'Renegade Raider')">Renegade Raider</button>
            </div>
        </div>

        <button class="btn-entrar" onclick="crearCuenta()">Entrar al Lobby</button>
    </div>

    <script>
        let datosUsuario = { nombre: '', fecha: '', genero: '', skin: '' };

        function seleccionarGenero(genero) {
            datosUsuario.genero = genero;
            datosUsuario.skin = ''; // Resetear skin
            
            // Actualizar botones visualmente
            document.getElementById('btn-hombre').classList.remove('active');
            document.getElementById('btn-mujer').classList.remove('active');
            document.getElementById('btn-' + genero).classList.add('active');

            // Mostrar las skins correspondientes
            document.getElementById('skins-hombre').style.display = genero === 'hombre' ? 'block' : 'none';
            document.getElementById('skins-mujer').style.display = genero === 'mujer' ? 'block' : 'none';

            // Limpiar selección de skins
            let skinBtns = document.getElementsByClassName('skin-btn');
            for(let btn of skinBtns) btn.classList.remove('active');
        }

        function seleccionarSkin(boton, nombreSkin) {
            datosUsuario.skin = nombreSkin;
            let skinBtns = document.parentElement?.getElementsByClassName('skin-btn') || document.getElementsByClassName('skin-btn');
            for(let btn of skinBtns) btn.classList.remove('active');
            boton.classList.add('active');
        }

        function crearCuenta() {
            datosUsuario.nombre = document.getElementById('nombre').value;
            datosUsuario.fecha = document.getElementById('fecha').value;

            if(!datosUsuario.nombre || !datosUsuario.fecha || !datosUsuario.genero || !datosUsuario.skin) {
                alert("¡Faltan datos! Completa tu nombre, fecha, género y elige una skin.");
                return;
            }

            // Guardar en la memoria del navegador para pasarlo al lobby
            localStorage.setItem('shootSchoolUser', JSON.stringify(datosUsuario));
            
            // Ir al lobby que ya creaste
            window.location.href = 'lobby.html';
        }
    </script>
</body>
</html>

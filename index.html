<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOOT SCHOOL - LOBBY OFICIAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Jura:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
           CSS: ESTILO FRUTIGER AERO Y FORTNITE (Unificado)
           Basado en capturas 1 y 2
           ============================================================ */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; /* Evita que la pantalla se mueva */
            font-family: 'Quicksand', sans-serif;
            background: #050505;
        }

        /* Fondo de Video (De la captura 5) */
        .video-bg {
            position: absolute; inset: 0; z-index: 1;
            pointer-events: none; transition: opacity 1s;
        }
        .video-bg iframe {
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0.6; /* Brillo ajustado */
        }

        /* Contenedor del Motor 3D */
        #canvas-3d {
            position: absolute; inset: 0; z-index: 5;
            pointer-events: none; /* Deja clic al login */
        }

        /* PANTALLA DE REGISTRO (Capturas 1 y 2) */
        .ui-overlay {
            position: absolute; inset: 0; z-index: 20;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 15, 30, 0.4); backdrop-filter: blur(8px);
        }

        .frutiger-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(0,200,255,0.4));
            border: 3px solid white; border-radius: 40px;
            padding: 40px; width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,100,255,0.4), inset 0 0 20px rgba(255,255,255,0.8);
        }

        h1 { margin: 0 0 10px; font-family: 'Jura', sans-serif; font-size: 2.8rem; background: linear-gradient(to bottom, #00bbff, #0055ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin-bottom: 20px; font-size: 1.1rem; font-weight: 700; color: #005588; }

        .input-frutiger {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 15px;
            border: 2px solid #00bbff; background: rgba(255,255,255,0.9);
            font-size: 1rem; color: #005588; text-align: center; font-weight: bold; outline: none;
        }
        .btn-go {
            background: linear-gradient(to bottom, #77eeff 0%, #00aaff 25%, #0088ff 70%, #0066ee 100%);
            color: white; border: none; width: 100%; border-radius: 20px;
            padding: 15px; font-size: 1.4rem; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase;
        }
        .btn-go:hover { transform: scale(1.05); }

        /* HUD DEL LOBBY (Se muestra al entrar) */
        #hud-lobby { display: none; position: absolute; inset: 0; z-index: 15; pointer-events: none; }
        
        .info-player { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.85); padding: 15px 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .info-player h2 { margin: 0; color: #0055ff; font-family: 'Jura', sans-serif; font-size: 1.8rem; }
        
        /* Botones de Skins estilo Fortnite */
        #shop-pills { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 12px; pointer-events: auto; }
        .pill { background: rgba(0, 20, 40, 0.7); border: 2px solid #00bbff; border-radius: 30px; padding: 12px 25px; cursor: pointer; color: #00ffff; font-weight: bold; }
        
        /* Botón LISTO estilo Fortnite */
        .btn-ready {
            position: absolute; bottom: 30px; right: 30px; pointer-events: auto;
            background: linear-gradient(to bottom, #ffea00, #ffbb00 50%, #cc8800 100%);
            color: white; border: none; padding: 15px 45px;
            font-family: 'Jura', sans-serif; font-size: 1.8rem; font-weight: 700; border-radius: 10px; cursor: pointer;
            box-shadow: 0 8px 0 #aa6600; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="video-bg">
        <iframe src="https://www.youtube.com/embed/I5NTleOZVg8?autoplay=1&mute=1&loop=1&playlist=I5NTleOZVg8&controls=0&modestbranding=1" frameborder="0"></iframe>
    </div>

    <div id="canvas-3d"></div>

    <div class="ui-overlay" id="reg-screen">
        <div class="frutiger-card">
            <h1>SHOOT SCHOOL</h1>
            <p>CREA TU CUENTA TÁCTICA</p>
            <input type="text" id="in-nick" class="input-frutiger" placeholder="Ingresa tu Nickname..." required>
            <input type="date" id="in-dob" class="input-frutiger" required>
            <input type="number" id="in-edad" class="input-frutiger" placeholder="Edad..." min="10" required>
            <select id="in-gender" class="input-frutiger">
                <option value="H">Género: HOMBRE</option>
                <option value="M">Género: MUJER</option>
            </select>
            <button class="btn-go" onclick="crearCuenta()">CREAR CUENTA</button>
        </div>
    </div>

    <div id="hud-lobby">
        <div class="info-player">
            <h2 id="hud-nick">SOLDIER</h2>
            <p>NIVEL 1</p>
        </div>
        
        <div id="shop-pills">
            <button class="pill" onclick="cargarModelo('CT.glb')">CT URBAN</button>
            <button class="pill" onclick="cargarModelo('Lara.glb')">LARA SWIM</button>
            <button class="pill" onclick="cargarModelo('Renegade.glb')">RENEGADE</button>
            <button class="pill" onclick="cargarModelo('Phoenix.glb')">PHOENIX</button>
        </div>

        <button class="btn-ready" onclick="alert('Buscando partida...')">¡LISTO!</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        /* ============================================================
           JAVASCRIPT: MOTOR 3D Y LÓGICA (Unificado)
           Basado en capturas 3 y 4
           ============================================================ */
        const loader = new THREE.GLTFLoader();
        let scene, camera, renderer, skinActual;

        function crearCuenta() {
            // Lógica de la captura 4
            const nick = document.getElementById('in-nick').value;
            const edad = document.getElementById('in-edad').value;
            const genero = document.getElementById('in-gender').value;

            if(!nick || !edad) { alert("⚠️ ¡Completa tus datos tácticos, recluta!"); return; }

            // Cambiar pantallas
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('hud-lobby').style.display = 'block';
            document.getElementById('hud-nick').innerText = nick;

            initMotor3D();
            
            // Cargar skin inicial según género
            if(genero === "H") { cargarModelo('CT.glb'); } else { cargarModelo('Lara.glb'); }
        }

        function initMotor3D() {
            // Inicialización de la captura 4
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            
            // Luces para el personaje
            scene.add(new THREE.AmbientLight(0xffffff, 1.5)); 
            const luzFrontal = new THREE.DirectionalLight(0xffffff, 1);
            luzFrontal.position.set(0, 5, 5);
            scene.add(luzFrontal);
            
            camera.position.set(0, 1.2, 4.8); 
            animate();
        }

        function cargarModelo(archivo) {
            // Lógica de la captura 3
            if (skinActual) scene.remove(skinActual);
            
            loader.load(archivo, (gltf) => {
                skinActual = gltf.scene;
                
                // AUTO-ESCALADO Y CENTRADO (Captura 3)
                const box = new THREE.Box3().setFromObject(skinActual);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const scale = 2.6 / size.y; 
                skinActual.scale.set(scale, scale, scale);
                
                skinActual.position.x = -(center.x * scale);
                skinActual.position.y = -(center.y * scale) + 0.2; 

                scene.add(skinActual);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (skinActual) skinActual.rotation.y += 0.006; // Giro suave
            renderer.render(scene, camera);
        }

        window.onresize = () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };
    </script>
</body>
</html>

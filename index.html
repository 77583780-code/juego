<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOOT SCHOOL - LOBBY OFICIAL</title>
    <style>
        /* ================= CSS: ESTILO DEL JUEGO ================= */
        @import url('https://fonts.googleapis.com/css2?family=Jura:wght@500;700;900&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Jura', sans-serif; background: #050505; color: white; }

        #canvas-3d { position: absolute; inset: 0; z-index: 1; }

        /* PANTALLA DE INICIO */
        #menu-inicio {
            position: absolute; inset: 0; z-index: 20; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(20,30,40,0.9) 0%, rgba(0,0,0,1) 100%);
        }

        .panel-menu {
            background: rgba(10, 15, 20, 0.8); border: 2px solid #00ffcc; border-radius: 10px;
            padding: 40px; width: 350px; text-align: center; box-shadow: 0 0 30px rgba(0,255,204,0.3);
            backdrop-filter: blur(5px);
        }

        h1 { color: #00ffcc; font-size: 2.5rem; margin-top: 0; text-shadow: 0 0 10px #00ffcc; }

        .input-form {
            width: 90%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid #555; color: white; font-size: 1.1rem; border-radius: 5px; text-align: center;
        }
        .input-form:focus { border-color: #00ffcc; outline: none; }

        .btn-entrar {
            background: #00ffcc; color: black; border: none; width: 100%; padding: 15px;
            font-size: 1.3rem; font-weight: 900; margin-top: 20px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; border-radius: 5px;
        }
        .btn-entrar:hover { background: #00ccaa; box-shadow: 0 0 15px #00ffcc; transform: scale(1.05); }

        /* HUD DEL LOBBY */
        #hud-juego { display: none; position: absolute; inset: 0; z-index: 10; pointer-events: none; }

        .info-jugador {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7);
            padding: 15px 30px; border-left: 5px solid #00ffcc; border-radius: 0 10px 10px 0;
        }
        .info-jugador h2 { margin: 0; font-size: 1.8rem; color: #00ffcc; text-transform: uppercase; }
        .info-jugador p { margin: 5px 0 0; color: #ccc; font-weight: bold; }

        /* SELECTOR DE SKINS */
        .tienda-skins {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 15px; pointer-events: auto;
        }

        .btn-skin {
            background: rgba(20,20,20,0.8); border: 2px solid #00ffcc; color: white;
            padding: 12px 25px; font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; border-radius: 5px;
        }
        .btn-skin:hover { background: #00ffcc; color: black; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,255,204,0.4); }
        
        #mensaje-carga { 
            position: absolute; top: 20px; right: 20px; color: #00ffcc; 
            font-weight: bold; display: none; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="canvas-3d"></div>
    <div id="mensaje-carga">CARGANDO MODELO 3D...</div>

    <div id="menu-inicio">
        <div class="panel-menu">
            <h1>SHOOT SCHOOL</h1>
            <input type="text" id="nombre" class="input-form" placeholder="TU NICKNAME" required>
            <input type="number" id="edad" class="input-form" placeholder="TU EDAD" min="10" required>
            <select id="genero" class="input-form">
                <option value="H">GÉNERO: HOMBRE</option>
                <option value="M">GÉNERO: MUJER</option>
            </select>
            <button class="btn-entrar" onclick="iniciar()">CONECTAR AL LOBBY</button>
        </div>
    </div>

    <div id="hud-juego">
        <div class="info-jugador">
            <h2 id="hud-nick">JUGADOR</h2>
            <p id="hud-nivel">NIVEL: 0</p>
        </div>
        
        <div class="tienda-skins" id="caja-skins">
            <button class="btn-skin" onclick="cargarPersonaje('CT.glb')">CT URBAN</button>
            <button class="btn-skin" onclick="cargarPersonaje('Lara.glb')">LARA</button>
            <button class="btn-skin" onclick="cargarPersonaje('Renegade.glb')">RENEGADE</button>
            <button class="btn-skin" onclick="cargarPersonaje('Phoenix.glb')">PHOENIX</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const loader = new THREE.GLTFLoader();
        let scene, camera, renderer, personajeActual;

        function iniciar() {
            const nombre = document.getElementById('nombre').value;
            const edad = document.getElementById('edad').value;
            const genero = document.getElementById('genero').value;

            if(!nombre || !edad) {
                alert("⚠️ TIENES QUE LLENAR TUS DATOS SOLDADO.");
                return;
            }

            // Cambiar pantallas
            document.getElementById('menu-inicio').style.display = 'none';
            document.getElementById('hud-juego').style.display = 'block';
            document.getElementById('hud-nick').innerText = nombre;
            document.getElementById('hud-nivel').innerText = `NIVEL: ${edad}`;

            // Iniciar 3D
            iniciarMotor();
            cargarEntorno();
            
            // Cargar skin inicial según género
            if(genero === "H") {
                cargarPersonaje('CT.glb');
            } else {
                cargarPersonaje('Lara.glb');
            }
        }

        function iniciarMotor() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Mejorar texturas
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            
            // Luces para que los personajes se vean en HD
            const ambient = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambient);
            
            const luzDir = new THREE.DirectionalLight(0xffffff, 1.5);
            luzDir.position.set(2, 5, 5);
            scene.add(luzDir);

            const luzEspalda = new THREE.DirectionalLight(0x00ffcc, 0.5);
            luzEspalda.position.set(-2, 2, -5);
            scene.add(luzEspalda);
            
            camera.position.set(0, 1.2, 4.5); // Cámara ajustada
            animate();
        }

        function cargarEntorno() {
            document.getElementById('mensaje-carga').style.display = 'block';
            // Carga exactamente el archivo de tu GitHub
            loader.load('Lobby.glb', (gltf) => {
                let lobby = gltf.scene;
                lobby.scale.set(1.5, 1.5, 1.5); // Tamaño del lobby
                lobby.position.set(0, -1, -3); // Posición hacia atrás
                scene.add(lobby);
                document.getElementById('mensaje-carga').style.display = 'none';
            }, undefined, (e) => {
                console.error("Error cargando Lobby:", e);
                document.getElementById('mensaje-carga').style.display = 'none';
            });
        }

        function cargarPersonaje(archivo) {
            document.getElementById('mensaje-carga').style.display = 'block';
            document.getElementById('mensaje-carga').innerText = "CARGANDO SKIN...";
            
            if (personajeActual) scene.remove(personajeActual);
            
            // Carga exactamente los archivos de tu GitHub
            loader.load(archivo, (gltf) => {
                personajeActual = gltf.scene;
                
                // ESTA ES LA MAGIA QUE ARREGLA EL TAMAÑO DE LAS SKINS
                const box = new THREE.Box3().setFromObject(personajeActual);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const scale = 2.2 / size.y; // Fuerza a todos a medir 2.2
                personajeActual.scale.set(scale, scale, scale);
                
                // Los centra en la pantalla
                personajeActual.position.x = -(center.x * scale);
                personajeActual.position.y = -(box.min.y * scale) - 1.2; 
                personajeActual.position.z = 0; // Frente a la cámara
                
                scene.add(personajeActual);
                document.getElementById('mensaje-carga').style.display = 'none';
            }, undefined, (e) => {
                console.error("Error cargando el personaje:", e);
                document.getElementById('mensaje-carga').innerText = "ERROR AL CARGAR SKIN";
                setTimeout(() => document.getElementById('mensaje-carga').style.display = 'none', 3000);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            // Hace que la skin gire lentamente
            if (personajeActual) personajeActual.rotation.y += 0.005; 
            renderer.render(scene, camera);
        }

        // Ajusta la pantalla si cambias el tamaño de la ventana
        window.onresize = () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SHOOT SCHOOL - LOBBY</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=Jura:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Quicksand', sans-serif; }
        
        /* FONDO Y VIDEO */
        .video-bg { position: absolute; inset: 0; z-index: 1; opacity: 0.5; pointer-events: none; }
        .video-bg iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        #canvas-3d { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        /* INTERFAZ DE REGISTRO */
        .overlay { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .card { background: linear-gradient(135deg, #ffffff, #8be2ff); padding: 30px; border-radius: 30px; text-align: center; width: 320px; border: 4px solid #fff; box-shadow: 0 0 30px rgba(0,180,255,0.5); }
        
        h1 { font-family: 'Jura', sans-serif; color: #0066ff; margin: 0; font-size: 2.5rem; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 2px solid #00a2ff; font-weight: bold; text-align: center; }
        
        .btn-start { background: #007bff; color: #fff; border: none; padding: 15px 30px; border-radius: 20px; font-size: 1.2rem; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.05); background: #0056b3; }

        /* HUD DEL JUEGO */
        #hud { display: none; position: absolute; inset: 0; z-index: 15; pointer-events: none; }
        .player-info { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 15px; border-left: 5px solid #007bff; }
        
        .skin-menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto; }
        .btn-skin { background: rgba(0,0,0,0.8); color: #00ccff; border: 2px solid #00ccff; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        
        .btn-ready { position: absolute; bottom: 20px; right: 20px; background: #ffcc00; color: #000; border: none; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; pointer-events: auto; box-shadow: 0 5px 0 #b38f00; }
    </style>
</head>
<body>

    <div class="video-bg">
        <iframe src="https://www.youtube.com/embed/I5NTleOZVg8?autoplay=1&mute=1&loop=1&playlist=I5NTleOZVg8&controls=0" frameborder="0"></iframe>
    </div>

    <div id="canvas-3d"></div>

    <div class="overlay" id="login">
        <div class="card">
            <h1>SHOOT SCHOOL</h1>
            <p>REGISTRO TÁCTICO</p>
            <input type="text" id="nick" placeholder="NICKNAME">
            <input type="number" id="edad" placeholder="EDAD">
            <select id="genero">
                <option value="H">HOMBRE</option>
                <option value="M">MUJER</option>
            </select>
            <button class="btn-start" onclick="iniciar()">ENTRAR AL LOBBY</button>
        </div>
    </div>

    <div id="hud">
        <div class="player-info">
            <h2 id="display-nick">PLAYER</h2>
            <p id="display-lv">NIVEL 1</p>
        </div>
        <div class="skin-menu">
            <button class="btn-skin" onclick="cambiarSkin('CT.glb')">CT URBAN</button>
            <button class="btn-skin" onclick="cambiarSkin('Lara.glb')">LARA</button>
            <button class="btn-skin" onclick="cambiarSkin('Renegade.glb')">RENEGADE</button>
        </div>
        <button class="btn-ready" onclick="alert('Buscando partida...')">¡LISTO!</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, model;
        const loader = new THREE.GLTFLoader();

        function iniciar() {
            const nick = document.getElementById('nick').value;
            const edad = document.getElementById('edad').value;
            if(!nick) return alert("Pon tu nick, we");

            document.getElementById('login').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('display-nick').innerText = nick;
            document.getElementById('display-lv').innerText = "NIVEL " + (edad || "1");

            init3D();
            cambiarSkin(document.getElementById('genero').value === "H" ? 'CT.glb' : 'Lara.glb');
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-3d').appendChild(renderer.domElement);

            const light = new THREE.AmbientLight(0xffffff, 2);
            scene.add(light);
            const dl = new THREE.DirectionalLight(0xffffff, 1);
            dl.position.set(0, 5, 5);
            scene.add(dl);

            camera.position.set(0, 1.2, 4);
            animate();
        }

        function cambiarSkin(file) {
            if(model) scene.remove(model);
            loader.load(file, (gltf) => {
                model = gltf.scene;
                // Ajuste de tamaño automático
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const sc = 2.5 / size.y;
                model.scale.set(sc, sc, sc);
                model.position.y = -1;
                scene.add(model);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(model) model.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

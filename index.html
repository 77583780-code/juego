<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoot School Cima God</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="image-background"></div>

    <div id="threejs_canvas"></div>

    <div id="inicio_pantalla" class="pantalla-ui">
        <div class="caja_menu_inicial">
            <h1>SHOOT SCHOOL CIMA GOD</h1>
            <input type="text" id="reg_nombre" placeholder="Nombre de Jugador">
            <select id="reg-genero">
                <option value="hombre">Skin: Master Chief</option>
                <option value="mujer">Skin: Chica</option>
            </select>
            <button class="btn-amarillo" id="btn_entrar_lobby">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="lobby_pantalla" class="pantalla-ui" style="display: none;">
        
        <div class="top-header">
            <div class="logo">SHOOT SCHOOL CIMA GOD</div>
            <div class="user-info">
                <span class="coins">C 900 Cima Coins</span>
                <span class="user-badge">S</span>
                <span id="display_nombre_user">Soldado</span>
            </div>
        </div>

        <div class="main-nav">
            <span class="nav-item active">LOBBY</span>
            <span class="nav-item">BATTLE PASS</span>
            <span class="nav-item">LOCKER</span>
        </div>

        <div class="left-panel">
            <div class="season-header">SEASON CIMA</div>
            <div class="level-box">
                <div class="icon-level">🧂</div>
                <div class="level-info">
                    <h2>LEVEL 1</h2>
                    <p>0 / 1,000 XP</p>
                    <div class="xp-bar"><div class="xp-fill"></div></div>
                </div>
            </div>
        </div>

        <div class="right-server-panel">
            <div class="server-options-box">
                <h3>SERVER OPCIONES</h3>
                <button class="btn-server" onclick="juego.abrirModal()">UNIRSE A SERVER</button>
                <button class="btn-server" onclick="juego.crearServidorPublico()">CREAR SERVER: PÚBLICO</button>
                
                <div class="input-row">
                    <label>Clima</label>
                    <select id="sel-clima">
                        <option value="dia">Día</option>
                        <option value="atardecer">Atardecer</option>
                        <option value="noche">Noche</option>
                    </select>
                </div>
                
                <div class="input-row">
                    <label>Código de sala</label>
                    <input type="text" id="cod-privado">
                </div>
                
                <button class="btn-server" onclick="juego.crearServidorPrivado()">CREAR SERVIDOR PRIVADO</button>
            </div>
        </div>

        <div class="bottom-right-play">
            <div class="game-mode-box">
                <p class="small-title">GAME MODE:</p>
                <h2>SQUAD</h2>
                <p style="margin:0; font-size:12px; color:#aaa;">(Public selected)</p>
            </div>
            <button class="btn-ready-giant" id="btn_play_main"><span class="btn-icon">P</span> READY</button>
        </div>

    </div>

    <div id="modal-servidores" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center;">
        <div style="background: #111; padding: 20px; border: 2px solid #fce100; width: 400px; color: white;">
            <h2 style="font-family: 'Teko', sans-serif; font-size: 30px; margin-top: 0;">SERVIDORES ACTIVOS</h2>
            <div id="lista_servidores" style="background: rgba(0,0,0,0.5); height: 150px; overflow-y: auto; padding: 10px; border: 1px solid #444;"></div>
            <button onclick="juego.cerrarModal()" style="width: 100%; padding: 10px; background: #ff3333; color: white; border: none; margin-top: 10px; font-weight: bold; cursor: pointer;">CANCELAR</button>
        </div>
    </div>

    <div id="hud_pantalla" class="pantalla-ui" style="display: none; pointer-events: none;">
        <div id="crosshair" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: lime; font-size: 24px;">+</div>
        <div id="timer_partida" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 30px; font-weight: bold; color: white; text-shadow: 2px 2px black;">10:00</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
